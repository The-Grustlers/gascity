apiVersion: v1
kind: ServiceAccount
metadata:
  name: gc-agent
  namespace: gc
  labels:
    app.kubernetes.io/part-of: gas-city
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gc-agent
  namespace: gc
  labels:
    app.kubernetes.io/part-of: gas-city
rules:
  # Agent pods normally only need TCP access to Dolt. Delete access lets a
  # one-shot pod clean up its own session during `gc session close`; the
  # controller still owns pod creation and broader reconciliation.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gc-agent
  namespace: gc
  labels:
    app.kubernetes.io/part-of: gas-city
subjects:
  - kind: ServiceAccount
    name: gc-agent
    namespace: gc
roleRef:
  kind: Role
  name: gc-agent
  apiGroup: rbac.authorization.k8s.io
